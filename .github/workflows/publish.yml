name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync version and script into package
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          python3 -c "
          import pathlib, re
          f = pathlib.Path('.github/src/zoomrecovery/__init__.py')
          f.write_text(re.sub(r'__version__ = .*', '__version__ = \"' + '$VERSION' + '\"', f.read_text()))
          "
          cp zoomrecovery .github/src/zoomrecovery/_script.sh
          cp README.md LICENSE .github/

      - name: Build
        run: |
          pip install build
          python -m build .github/ --outdir dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
